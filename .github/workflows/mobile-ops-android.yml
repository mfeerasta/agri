name: mobile-ops-android

on:
  push:
    tags:
      - 'mobile-ops-v*'
  workflow_dispatch:

concurrency:
  group: mobile-ops-android-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-android:
    name: Build AAB and ship to Play Console internal
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      APP_DIR: apps/mobile-ops
      PACKAGE_NAME: ai.feerasta.zameen.ops
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: rupafab
      SENTRY_PROJECT: zameen-mobile-ops
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Build ops PWA
        run: pnpm --filter @zameen/ops build

      - name: Resolve version from tag
        id: ver
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VER="${REF_NAME#mobile-ops-v}"
          if [ -z "$VER" ] || [ "$VER" = "$REF_NAME" ]; then VER="0.0.0-dev"; fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "code=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Build native bridge
        run: pnpm --filter @zameen/mobile-ops run build:bridge

      - name: Add Android platform and sync
        working-directory: ${{ env.APP_DIR }}
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Decode upload keystore
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "${APP_DIR}/android/keystore"
          echo "$KS_B64" | base64 --decode > "${APP_DIR}/android/keystore/upload.jks"

      - name: Stamp versionName and versionCode
        working-directory: ${{ env.APP_DIR }}/android/app
        env:
          VER: ${{ steps.ver.outputs.version }}
          CODE: ${{ steps.ver.outputs.code }}
        run: |
          set -euo pipefail
          sed -i "s/versionName \".*\"/versionName \"${VER}\"/" build.gradle
          sed -i "s/versionCode [0-9]\+/versionCode ${CODE}/" build.gradle

      - name: Bundle release AAB
        working-directory: ${{ env.APP_DIR }}/android
        env:
          KS_PWD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PWD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$(pwd)/keystore/upload.jks" \
            -Pandroid.injected.signing.store.password="$KS_PWD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PWD"

      - name: Upload mapping to Sentry
        if: env.SENTRY_AUTH_TOKEN != ''
        run: |
          npm install -g @sentry/cli
          MAPPING="${APP_DIR}/android/app/build/outputs/mapping/release/mapping.txt"
          if [ -f "$MAPPING" ]; then
            sentry-cli upload-proguard --org "$SENTRY_ORG" --project "$SENTRY_PROJECT" \
              --android-manifest "${APP_DIR}/android/app/src/main/AndroidManifest.xml" \
              "$MAPPING" || true
          fi

      - name: Upload to Play Console internal track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ai.feerasta.zameen.ops
          releaseFiles: ${{ env.APP_DIR }}/android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          mappingFile: ${{ env.APP_DIR }}/android/app/build/outputs/mapping/release/mapping.txt

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-ops-android-aab
          path: ${{ env.APP_DIR }}/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
