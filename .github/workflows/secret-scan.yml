name: secret-scan
on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: run scanner
        run: bash deploy/scan-secrets.sh
