name: mobile-ops-ios

on:
  push:
    tags:
      - 'mobile-ops-v*'
  workflow_dispatch:

concurrency:
  group: mobile-ops-ios-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-ios:
    name: Build and ship to TestFlight
    runs-on: macos-14
    timeout-minutes: 60
    env:
      APP_DIR: apps/mobile-ops
      SCHEME: App
      BUNDLE_ID: ai.feerasta.zameen.ops
      SENTRY_DSN: ${{ secrets.SENTRY_DSN_MOBILE_OPS }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: rupafab
      SENTRY_PROJECT: zameen-mobile-ops
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm' }

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Build ops PWA
        run: pnpm --filter @zameen/ops build

      - name: Resolve version from tag
        id: ver
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VER="${REF_NAME#mobile-ops-v}"
          if [ -z "$VER" ] || [ "$VER" = "$REF_NAME" ]; then VER="0.0.0-dev"; fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "build=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Build native bridge
        run: pnpm --filter @zameen/mobile-ops run build:bridge

      - name: Add iOS platform and sync
        working-directory: ${{ env.APP_DIR }}
        run: |
          npx cap add ios || true
          npx cap sync ios

      - name: Import signing certificate
        env:
          P12: ${{ secrets.IOS_DIST_CERT_P12 }}
          P12_PWD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN=build.keychain
          KPWD=$(uuidgen)
          security create-keychain -p "$KPWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KPWD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          echo "$P12" | base64 --decode > /tmp/dist.p12
          security import /tmp/dist.p12 -k "$KEYCHAIN" -P "$P12_PWD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KPWD" "$KEYCHAIN" >/dev/null
          rm /tmp/dist.p12

      - name: Install provisioning profile
        env:
          PROFILE: ${{ secrets.IOS_PROVISION_PROFILE_OPS }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$PROFILE" | base64 --decode > "$HOME/Library/MobileDevice/Provisioning Profiles/zameen-ops-dist.mobileprovision"

      - name: Set version and build number
        working-directory: ${{ env.APP_DIR }}/ios/App
        env:
          VER: ${{ steps.ver.outputs.version }}
          BUILD: ${{ steps.ver.outputs.build }}
        run: |
          set -euo pipefail
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VER" App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" App/Info.plist

      - name: Archive
        working-directory: ${{ env.APP_DIR }}/ios/App
        env:
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          xcodebuild -workspace App.xcworkspace -scheme "$SCHEME" \
            -configuration Release -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            CODE_SIGN_STYLE=Manual DEVELOPMENT_TEAM="$TEAM_ID" archive

      - name: Export IPA
        working-directory: ${{ env.APP_DIR }}/ios/App
        env:
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>${TEAM_ID}</string>
            <key>signingStyle</key><string>manual</string>
            <key>uploadBitcode</key><false/>
            <key>uploadSymbols</key><true/>
          </dict></plist>
          EOF
          xcodebuild -exportArchive -archivePath build/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist -exportPath build/export

      - name: Upload dSYMs to Sentry
        if: env.SENTRY_AUTH_TOKEN != ''
        run: |
          npm install -g @sentry/cli
          sentry-cli debug-files upload --include-sources \
            --org "$SENTRY_ORG" --project "$SENTRY_PROJECT" \
            "${APP_DIR}/ios/App/build/App.xcarchive/dSYMs"

      - name: Upload to TestFlight
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$API_KEY" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8
          IPA=$(ls "${APP_DIR}/ios/App/build/export/"*.ipa | head -1)
          xcrun altool --upload-app --type ios --file "$IPA" \
            --apiKey "$API_KEY_ID" --apiIssuer "$API_ISSUER_ID"

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-ops-ios-ipa
          path: ${{ env.APP_DIR }}/ios/App/build/export/*.ipa
          if-no-files-found: warn
