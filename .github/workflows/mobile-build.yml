name: mobile-build

on:
  push:
    tags:
      - 'v*-mobile'
  workflow_dispatch:
    inputs:
      app:
        description: 'Which Capacitor app to build'
        required: true
        default: 'field'
        type: choice
        options:
          - field
          - ops

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      APP_INPUT: ${{ github.event.inputs.app }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve app dir
        id: app
        run: |
          set -euo pipefail
          APP_NAME="${APP_INPUT:-field}"
          case "$APP_NAME" in
            field|ops) ;;
            *) echo "invalid app: $APP_NAME"; exit 1 ;;
          esac
          echo "name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "dir=apps/mobile-$APP_NAME" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Build native bridge
        env:
          APP_NAME: ${{ steps.app.outputs.name }}
        run: pnpm --filter "@zameen/mobile-${APP_NAME}" run build:bridge

      - name: Add Android platform and sync
        working-directory: ${{ steps.app.outputs.dir }}
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Assemble release APK
        working-directory: ${{ steps.app.outputs.dir }}/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artefact
        uses: actions/upload-artifact@v4
        with:
          name: zameen-${{ steps.app.outputs.name }}-android-release
          path: ${{ steps.app.outputs.dir }}/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/v') && endsWith(github.ref, '-mobile')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.app.outputs.dir }}/android/app/build/outputs/apk/release/*.apk

  ios:
    name: iOS (manual)
    runs-on: ubuntu-latest
    steps:
      - name: Document manual iOS process
        run: |
          echo "iOS signed builds are produced manually via Xcode on a"
          echo "macOS workstation using the Apple Developer signing cert."
          echo "Phase 3 will introduce Fastlane Match and a self-hosted"
          echo "macOS runner."
