name: deploy-staging

on:
  push:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_PREFIX: ghcr.io/${{ github.repository }}
      TAG: staging-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9 }

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Turbo build
        run: pnpm build

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images per app
        run: |
          set -euo pipefail
          for app in web field ops approve; do
            img="$IMAGE_PREFIX/$app:$TAG"
            echo "==> building $img"
            docker buildx build \
              --file Dockerfile \
              --build-arg APP="$app" \
              --tag "$img" \
              --push .
          done

      - name: SSH deploy to staging VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_VPS_HOST }}
          username: ${{ secrets.STAGING_VPS_USER }}
          key: ${{ secrets.STAGING_VPS_SSH_KEY }}
          envs: TAG,IMAGE_PREFIX
          script: |
            set -euo pipefail
            cd /opt/zameen
            docker compose pull
            docker compose up -d

      - name: Integration tests against staging
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          RUN_INT_TESTS: '1'
        run: pnpm test:int

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Playwright e2e against staging
        env:
          E2E_WEB_URL: https://staging.agri.feerasta.ai
          E2E_FIELD_URL: https://field-staging.agri.feerasta.ai
          E2E_APPROVE_URL: https://approve-staging.agri.feerasta.ai
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
        run: pnpm test:e2e
